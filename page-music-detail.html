<section id="page-music-detail" class="page-section">
  <div class="flex items-center gap-2 mb-4">
    <button onclick="showPage('inspiration')" class="text-xs text-gray-500 hover:text-gray-800 dark:hover:text-gray-200 flex items-center gap-1"><span>←</span> 返回灵感广场</button>
    <span class="text-gray-300">/</span>
    <button onclick="showPage('series-detail')" class="text-xs text-blue-500 hover:underline flex items-center gap-1">返回系列详情页</button>
  </div>

  <div class="flex flex-col md:flex-row gap-5">
    <!-- 左侧：音频播放区 -->
    <div class="md:w-[55%] shrink-0">
      <div class="bg-white dark:bg-gray-800 border border-gray-200 dark:border-gray-700 rounded-2xl overflow-hidden p-6 text-center">
        <div class="mb-4">
          <div class="w-20 h-20 rounded-full bg-gradient-to-br from-pink-400 to-rose-500 mx-auto flex items-center justify-center text-white text-2xl cursor-pointer group" onclick="toggleMusicPlay(this)">
            <span class="group-hover:scale-110 transition-transform">▶</span>
          </div>
        </div>
        <!-- 波形可视化 -->
        <div class="flex items-center justify-center gap-0.5 h-12 mb-4">
          <span class="w-1 bg-pink-300 rounded-full" style="height:40%"></span>
          <span class="w-1 bg-pink-300 rounded-full" style="height:65%"></span>
          <span class="w-1 bg-pink-400 rounded-full" style="height:85%"></span>
          <span class="w-1 bg-pink-400 rounded-full" style="height:55%"></span>
          <span class="w-1 bg-pink-500 rounded-full" style="height:90%"></span>
          <span class="w-1 bg-pink-500 rounded-full" style="height:70%"></span>
          <span class="w-1 bg-pink-400 rounded-full" style="height:95%"></span>
          <span class="w-1 bg-pink-400 rounded-full" style="height:60%"></span>
          <span class="w-1 bg-pink-300 rounded-full" style="height:80%"></span>
          <span class="w-1 bg-pink-300 rounded-full" style="height:45%"></span>
          <span class="w-1 bg-pink-400 rounded-full" style="height:75%"></span>
          <span class="w-1 bg-pink-500 rounded-full" style="height:88%"></span>
          <span class="w-1 bg-pink-500 rounded-full" style="height:50%"></span>
          <span class="w-1 bg-pink-400 rounded-full" style="height:92%"></span>
          <span class="w-1 bg-pink-300 rounded-full" style="height:60%"></span>
        </div>
        <!-- 播放控制 -->
        <div class="flex items-center justify-center gap-4 mb-2">
          <button onclick="showToast('⏪ 上一首')" class="text-gray-400 hover:text-gray-600 text-lg">⏪</button>
          <button onclick="toggleMusicPlay(this)" class="w-10 h-10 rounded-full bg-gradient-to-br from-pink-500 to-rose-500 flex items-center justify-center text-white hover:scale-105 transition-transform text-lg">▶</button>
          <button onclick="showToast('⏩ 下一首')" class="text-gray-400 hover:text-gray-600 text-lg">⏩</button>
        </div>
        <div class="text-[11px] text-gray-400 mb-3">0:00 / 3:45</div>
        <div class="flex items-center justify-between text-xs text-gray-400 px-2">
          <span>🔊</span>
          <div class="flex-1 h-1 bg-gray-200 dark:bg-gray-600 rounded-full mx-2"><div class="w-0 h-full bg-pink-500 rounded-full"></div></div>
        </div>
      </div>
      <!-- 作品简介 -->
      <div class="bg-white dark:bg-gray-800 border border-gray-200 dark:border-gray-700 rounded-xl p-4 mt-4">
        <div class="text-xs font-semibold mb-2">📝 作品简介</div>
        <div class="border-t border-gray-100 dark:border-gray-700 mb-2"></div>
        <div class="text-[11px] text-gray-600 dark:text-gray-400 leading-relaxed">一首AI生成的治愈系纯音乐，适合放松、冥想、学习时聆听。</div>
      </div>
      <!-- 评论区 -->
      <div class="bg-white dark:bg-gray-800 border border-gray-200 dark:border-gray-700 rounded-xl p-4 mt-4">
        <div class="text-xs font-semibold mb-3">💬 评论区 (45)</div>
        <div class="space-y-2 mb-3">
          <div class="p-2 bg-gray-50 dark:bg-gray-700/50 rounded-lg"><div class="flex items-center justify-between mb-1"><span class="text-[10px] font-medium">用户A</span><button onclick="showToast('💬 回复评论')" class="text-[9px] text-blue-500 hover:underline">回复</button></div><div class="text-[10px] text-gray-500">太好听了！</div></div>
        </div>
        <div class="flex items-center gap-2 border-t border-gray-100 dark:border-gray-700 pt-2">
          <input class="flex-1 text-[10px] border border-gray-200 dark:border-gray-600 rounded-lg px-2.5 py-1.5 bg-white dark:bg-gray-800 focus:outline-none focus:border-blue-500" placeholder="发表评论...">
          <button onclick="showToast('✅ 评论已发布')" class="px-3 py-1.5 text-[10px] bg-blue-500 text-white rounded-lg hover:bg-blue-600 transition">发布</button>
        </div>
      </div>
    </div>
    <!-- 右侧：信息面板 -->
    <div class="flex-1 min-w-0">
      <div class="bg-white dark:bg-gray-800 border border-gray-200 dark:border-gray-700 rounded-xl p-5 mb-4">
        <div class="text-base font-bold mb-3">月光 · AI音乐作品</div>
        <div class="space-y-2 text-xs">
          <div class="flex items-center gap-2"><span class="text-gray-400 w-16 shrink-0">👤 作者</span><span class="font-medium">青铜娃娃</span><span class="text-[9px] text-gray-400 ml-auto">🎵 海螺</span></div>
          <div class="flex items-center gap-2"><span class="text-gray-400 w-16 shrink-0">📅 日期</span><span>2026-05-19</span></div>
          <div class="flex items-center gap-2"><span class="text-gray-400 w-16 shrink-0">⚙️ 参数</span><span class="font-mono text-[10px]">44.1kHz, MP3</span></div>
          <div class="flex items-center gap-3 pt-2 border-t border-gray-100 dark:border-gray-700 mt-2">
            <span class="flex items-center gap-1 text-xs">❤️ <span class="font-medium">890</span></span>
            <span class="flex items-center gap-1 text-xs">👁️ <span class="font-medium">2.1k</span></span>
            <span class="flex items-center gap-1 text-xs">🔄 <span class="font-medium">234</span></span>
          </div>
        </div>
        <button onclick="useDesignAudio()" class="w-full mt-4 py-2.5 rounded-xl bg-gradient-to-r from-pink-500 to-rose-500 text-white text-xs font-semibold hover:from-pink-600 hover:to-rose-600 transition">✨ 使用此音乐</button>
        <div class="mt-3 p-3 bg-gray-50 dark:bg-gray-700/50 rounded-lg text-xs">
          <div class="flex items-center justify-between mb-1"><span>创作者: <strong>青铜娃娃</strong></span><span class="text-green-600">本月收益: ⚡123</span></div>
        </div>
      </div>
      <div class="bg-white dark:bg-gray-800 border border-gray-200 dark:border-gray-700 rounded-xl p-4">
        <div class="text-xs font-semibold mb-2">👍 相关推荐</div>
        <div class="grid grid-cols-2 gap-2">
          <div class="border border-gray-200 dark:border-gray-600 rounded-xl overflow-hidden cursor-pointer hover:shadow-sm transition" onclick="showToast('🎵 跳转音频作品')">
            <div class="aspect-square bg-gradient-to-br from-pink-200 to-rose-200 dark:from-pink-800/30 dark:to-rose-800/30 flex items-center justify-center text-2xl">🎵</div>
            <div class="p-1.5"><div class="text-[9px] font-medium truncate">星空</div></div>
          </div>
          <div class="border border-gray-200 dark:border-gray-600 rounded-xl overflow-hidden cursor-pointer hover:shadow-sm transition" onclick="showToast('🎵 跳转音频作品')">
            <div class="aspect-square bg-gradient-to-br from-purple-200 to-pink-200 dark:from-purple-800/30 dark:to-pink-800/30 flex items-center justify-center text-2xl">🎵</div>
            <div class="p-1.5"><div class="text-[9px] font-medium truncate">海浪</div></div>
          </div>
        </div>
      </div>
    </div>
  </div>
</section>
