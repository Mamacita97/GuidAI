<section id="page-audio" class="page-section relative">
  <!-- 音频结果展示区 -->
  <div id="audio-canvas-area" class="relative z-0 bg-gradient-to-br from-gray-100 to-gray-200 dark:from-gray-800 dark:to-gray-700 flex items-start justify-center overflow-auto">
    <div id="audio-empty-state" class="hidden absolute inset-0 flex items-center justify-center pointer-events-none z-0">
      <div class="text-center text-gray-400 text-sm w-full max-w-xl px-6">
        <div class="w-full h-36 bg-white/40 dark:bg-gray-900/30 backdrop-blur rounded-2xl border border-gray-200/60 dark:border-gray-600/60 flex items-center justify-center mb-4 shadow-sm">
          <div class="text-center">
            <div class="text-4xl mb-2">🔊</div>
            <div class="text-[11px] text-gray-500 dark:text-gray-400">音频波形可视化</div>
            <div class="text-[11px] mt-2 font-mono tabular-nums">▶ 0:00 / 0:00</div>
          </div>
        </div>
        <div>生成的音频将显示在这里</div>
      </div>
    </div>
    <div id="audio-hot-apps-slot" class="audio-hot-apps-slot">
      <div id="audio-hot-apps-mount" class="w-full max-w-3xl"></div>
      <div id="audio-empty-inline" class="w-full max-w-xl text-center text-gray-400 dark:text-gray-500 text-xs py-2 mb-1 px-4">
        <div class="w-full h-28 mx-auto bg-white/40 dark:bg-gray-900/30 backdrop-blur rounded-2xl border border-gray-200/60 dark:border-gray-600/60 flex items-center justify-center mb-3 shadow-sm">
          <div class="text-center">
            <div class="text-3xl mb-1">🔊</div>
            <div class="text-[10px] text-gray-500 dark:text-gray-400">输入文本并选择音色，开始语音创作</div>
          </div>
        </div>
      </div>
    </div>
    <div id="audio-results-container" class="hidden flex flex-col items-center w-full max-w-5xl mx-auto px-4 pt-4 gap-6 pb-4 relative z-[1]">
      <div id="audio-generating-state" class="hidden w-full bg-white/80 dark:bg-gray-800/80 backdrop-blur rounded-2xl shadow-lg p-4 scroll-mt-4">
        <div class="flex items-center gap-2 mb-3 text-[11px] text-amber-600 dark:text-amber-400 font-medium">
          <span class="inline-block w-2 h-2 rounded-full bg-amber-500 animate-pulse"></span>
          <span>生成中</span>
        </div>
        <div class="w-full flex flex-wrap items-center gap-x-3 gap-y-1 mb-3 text-[11px] text-gray-600 dark:text-gray-400">
          <span id="audio-gen-voice" class="px-2 py-0.5 bg-blue-100 dark:bg-blue-900/30 text-blue-700 dark:text-blue-300 rounded text-[10px] font-medium shrink-0">默认音色</span>
          <span id="audio-gen-model" class="shrink-0">Auto</span>
          <span class="text-gray-300 dark:text-gray-600">|</span>
          <span id="audio-gen-params" class="shrink-0">1.0x / 标准 / 无</span>
          <span class="text-gray-300 dark:text-gray-600">|</span>
          <span id="audio-gen-quality" class="shrink-0">Turbo</span>
        </div>
        <p id="audio-gen-prompt" class="result-prompt-text text-gray-700 dark:text-gray-300 mb-4 text-[12px] w-full"><span class="result-prompt-body"></span><span class="result-prompt-toggle-hint hidden"></span></p>
        <div class="rounded-xl border border-dashed border-gray-200 dark:border-gray-600 bg-gray-50/80 dark:bg-gray-900/40 p-6">
          <div class="w-full flex items-center gap-3">
            <div class="flex-1 h-2 bg-gray-200 dark:bg-gray-700 rounded-full overflow-hidden">
              <div id="audio-gen-progress-bar" class="h-full bg-gradient-to-r from-blue-500 to-purple-500 rounded-full transition-all duration-300" style="width:0%"></div>
            </div>
            <span id="audio-gen-status-text" class="text-[12px] text-gray-500 dark:text-gray-400 whitespace-nowrap tabular-nums">0%</span>
          </div>
          <div class="text-[12px] text-gray-500 dark:text-gray-400 mt-2"><span id="audio-gen-status-detail">正在准备任务...</span></div>
        </div>
      </div>
    </div>
  </div>

  <!-- 浮动输入框（音色 + 文本 + 工具栏） -->
  <div id="audio-input-area" class="pointer-events-auto">
    <div class="bg-white/95 dark:bg-gray-800/95 backdrop-blur border border-gray-200 dark:border-gray-700 rounded-2xl shadow-lg">
      <div id="audio-voice-bar" class="audio-voice-bar">
        <div class="audio-voice-bar-mobile hidden">
          <div class="media-tool-icons">
            <button type="button" class="media-tool-icon new-voice" title="新建音色" aria-label="新建音色">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 1a3 3 0 0 0-3 3v8a3 3 0 0 0 6 0V4a3 3 0 0 0-3-3z"/><path d="M19 10v2a7 7 0 0 1-14 0v-2"/><line x1="12" y1="19" x2="12" y2="22"/></svg>
            </button>
            <button type="button" id="audio-m-icon-voice" class="media-tool-icon" title="选择音色" onclick="openVoicePickerModal()">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>
            </button>
            <button type="button" class="media-tool-icon" title="资产导入" onclick="openAudioAssetModal()">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="18" height="18" rx="2"/><line x1="12" y1="8" x2="12" y2="16"/><line x1="8" y1="12" x2="16" y2="12"/></svg>
            </button>
          </div>
        </div>
        <div class="audio-voice-bar-desktop flex items-center gap-2 flex-wrap px-4 pt-2.5 pb-2 border-b border-gray-100 dark:border-gray-700">
          <button type="button" class="new-voice text-[11px] px-3 py-1.5 bg-blue-500 text-white rounded-lg hover:bg-blue-600 transition shrink-0">🎤 新建音色</button>
          <button type="button" id="audio-voice-picker-btn" onclick="openVoicePickerModal()" class="audio-voice-picker-btn" title="选择音色">
            <span id="audio-voice-picker-avatar" class="audio-voice-picker-btn-avatar" aria-hidden="true">音</span>
            <span id="audio-voice-picker-label" class="audio-voice-picker-btn-label truncate">选择音色</span>
            <svg class="shrink-0 text-gray-400" width="10" height="10" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" aria-hidden="true"><path d="M6 9l6 6 6-6"/></svg>
          </button>
          <button type="button" onclick="openAudioAssetModal()" class="audio-asset-import-btn shrink-0 inline-flex items-center gap-1 text-[11px] px-2.5 py-1.5 rounded-lg border border-gray-200 dark:border-gray-600 text-gray-600 dark:text-gray-300 hover:bg-gray-50 dark:hover:bg-gray-700 transition" title="从资产库导入">
            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" aria-hidden="true"><rect x="3" y="3" width="18" height="18" rx="2" ry="2"/><line x1="12" y1="8" x2="12" y2="16"/><line x1="8" y1="12" x2="16" y2="12"/></svg>
            <span class="whitespace-nowrap">资产导入</span>
          </button>
        </div>
        <input type="hidden" id="audio-selected-voice" value="">
        <input type="hidden" id="audio-selected-voice-id" value="">
        <select id="voice-select" class="hidden" aria-hidden="true" tabindex="-1"><option value="">选择音色</option></select>
      </div>
      <!-- 手机端：情绪表情条（紧贴输入框上方） -->
      <div id="audio-mobile-emotion-bar" class="hidden px-4 pt-1.5 pb-0 border-t border-gray-100 dark:border-gray-700">
        <div id="audio-mobile-emotion-content" class="flex flex-wrap gap-1.5">
          <!-- 由 JS 动态渲染 -->
        </div>
        <button type="button" id="audio-mobile-emotion-toggle" class="hidden w-full text-center text-[10px] text-gray-400 hover:text-gray-600 dark:hover:text-gray-300 py-0.5 mt-0.5" onclick="toggleAudioMobileEmotionBarExpand()">
          <svg class="inline-block w-3.5 h-3.5 transition-transform" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M6 9l6 6 6-6"/></svg>
        </button>
      </div>
      <div class="px-4 pt-2.5 pb-2">
        <textarea id="audio-prompt-textarea" placeholder="输入想要朗读的文本内容..." class="w-full text-xs border-0 bg-transparent outline-none resize-none leading-relaxed" rows="5"></textarea>
      </div>
      <div class="audio-toolbar-row media-toolbar-row flex flex-wrap items-center gap-2 px-3 py-2 border-t border-gray-100 dark:border-gray-700">
        <div id="audio-emotion-picker" class="hidden absolute bottom-full left-0 mb-1 z-50" role="listbox" aria-label="情绪表情">
          <div class="audio-emotion-picker-row audio-emotion-picker"></div>
        </div>
        <div class="media-toolbar-mobile hidden">
          <div class="media-tool-icons">
            <button type="button" id="audio-m-icon-model" class="media-tool-icon" title="音频模型" onclick="openAudioMobileSheet('model',event)">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="3"/><path d="M12 1v2M12 21v2M4.22 4.22l1.42 1.42M18.36 18.36l1.42 1.42M1 12h2M21 12h2M4.22 19.78l1.42-1.42M18.36 5.64l1.42-1.42"/></svg>
            </button>
            <button type="button" id="audio-m-icon-params" class="media-tool-icon" title="输出参数" onclick="openAudioMobileSheet('params',event)">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 2a3 3 0 0 0-3 3v7a3 3 0 0 0 6 0V5a3 3 0 0 0-3-3z"/><path d="M19 10v2a7 7 0 0 1-14 0v-2"/><line x1="12" y1="19" x2="12" y2="22"/></svg>
            </button>
            <button type="button" id="audio-m-icon-quality" class="media-tool-icon" title="质量" onclick="openAudioMobileSheet('quality',event)">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 2l3.09 6.26L22 9.27l-5 4.87 1.18 6.88L12 17.77l-6.18 3.25L7 14.14 2 9.27l6.91-1.01L12 2z"/></svg>
            </button>
            <button type="button" id="audio-m-icon-emotion" class="media-tool-icon" title="情绪" onclick="openAudioMobileSheet('emotion',event)">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><path d="M8 14s1.5 2 4 2 4-2 4-2"/><line x1="9" y1="9" x2="9.01" y2="9"/><line x1="15" y1="9" x2="15.01" y2="9"/></svg>
            </button>
            <button type="button" id="audio-m-icon-voice-in" class="media-tool-icon mobile-voice-btn" title="语音输入" data-voice-input="audio-prompt-textarea" onclick="toggleMobileVoiceInput(event)">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 1a3 3 0 0 0-3 3v8a3 3 0 0 0 6 0V4a3 3 0 0 0-3-3z"/><path d="M19 10v2a7 7 0 0 1-14 0v-2"/><line x1="12" y1="19" x2="12" y2="23"/><line x1="8" y1="23" x2="16" y2="23"/></svg>
            </button>
          </div>
          <button type="button" id="audio-gen-btn-mobile" onclick="startAudioGeneration()" class="media-gen-btn gen-btn px-3 py-1.5 bg-gradient-to-r from-blue-500 to-purple-600 text-white text-xs font-semibold rounded-xl hover:from-blue-600 hover:to-purple-700 transition">✨ 生成</button>
        </div>
        <div class="audio-toolbar-desktop flex flex-wrap items-center gap-2 w-full">
        <!-- 模型选择 -->
        <div class="relative shrink-0" id="audio-model-dropdown-container">
          <button type="button" onclick="toggleAudioModelDropdown()" class="text-[10px] px-2 py-1 rounded-lg border border-gray-200 dark:border-gray-600 hover:bg-gray-50 dark:hover:bg-gray-700 transition flex items-center gap-1.5 bg-gradient-to-r from-blue-50 to-purple-50 dark:from-blue-900/20 dark:to-purple-900/20">
            <svg width="10" height="10" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="3"/><path d="M12 1v2M12 21v2M4.22 4.22l1.42 1.42M18.36 18.36l1.42 1.42M1 12h2M21 12h2M4.22 19.78l1.42-1.42M18.36 5.64l1.42-1.42"/></svg>
            <span id="current-audio-model-text" class="text-gray-600 dark:text-gray-400 font-medium max-w-[120px] truncate">Auto</span>
            <svg width="8" height="8" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M6 9l6 6 6-6"/></svg>
          </button>
          <div id="audio-model-dropdown" class="hidden absolute bottom-full left-0 mb-1 w-56 bg-white dark:bg-gray-800 border border-gray-200 dark:border-gray-700 rounded-lg shadow-lg overflow-hidden z-50">
            <div class="px-3 py-2 text-[10px] text-gray-400 border-b border-gray-100 dark:border-gray-700 bg-gray-50 dark:bg-gray-800/50">🎵 音频模型</div>
            <div class="py-1 max-h-48 overflow-y-auto">
              <div onclick="selectAudioModel('Auto','🤖')" class="px-3 py-2 hover:bg-gray-50 dark:hover:bg-gray-700/50 cursor-pointer border-b border-gray-100 dark:border-gray-700/80">
                <div class="flex items-center gap-2"><span>🤖</span><div class="flex-1"><div class="flex items-center justify-between gap-2"><span class="text-[11px] font-medium">Auto</span><span class="text-[9px] px-1.5 py-0.5 bg-green-100 dark:bg-green-900/30 text-green-600 rounded shrink-0">推荐</span></div><div class="text-[9px] text-gray-400 mt-0.5">自动选择最优模型</div></div></div>
              </div>
              <div onclick="selectAudioModel('海螺语音克隆 2.8','🐚')" class="px-3 py-2 hover:bg-gray-50 dark:hover:bg-gray-700/50 cursor-pointer flex items-center gap-2 text-[11px]"><span>🐚</span><span>海螺语音克隆 2.8</span></div>
              <div onclick="selectAudioModel('ElevenLabs Turbo','🔊')" class="px-3 py-2 hover:bg-gray-50 dark:hover:bg-gray-700/50 cursor-pointer flex items-center gap-2 text-[11px]"><span>🔊</span><span>ElevenLabs Turbo</span></div>
              <div onclick="selectAudioModel('Fish Audio','🐟')" class="px-3 py-2 hover:bg-gray-50 dark:hover:bg-gray-700/50 cursor-pointer flex items-center gap-2 text-[11px]"><span>🐟</span><span>Fish Audio</span></div>
              <div onclick="selectAudioModel('GPT-4o Voice','🧠')" class="px-3 py-2 hover:bg-gray-50 dark:hover:bg-gray-700/50 cursor-pointer flex items-center gap-2 text-[11px]"><span>🧠</span><span>GPT-4o Voice</span></div>
              <div onclick="selectAudioModel('CosmicVoice','🌌')" class="px-3 py-2 hover:bg-gray-50 dark:hover:bg-gray-700/50 cursor-pointer flex items-center gap-2 text-[11px]"><span>🌌</span><span>CosmicVoice</span></div>
            </div>
          </div>
        </div>
        <!-- 输出参数（语速 / 语调 / 音效） -->
        <div class="relative shrink-0" id="audio-output-params-wrap">
          <button type="button" onclick="toggleAudioOutputParamsDropdown()" class="text-[10px] px-2.5 py-1 rounded-lg border border-gray-300 dark:border-gray-600 bg-gray-50 dark:bg-gray-700/50 hover:bg-gray-100 dark:hover:bg-gray-600 transition flex items-center gap-1.5 text-gray-700 dark:text-gray-200">
            <svg class="shrink-0 text-gray-500 dark:text-gray-400" width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M12 2a3 3 0 0 0-3 3v7a3 3 0 0 0 6 0V5a3 3 0 0 0-3-3z"/><path d="M19 10v2a7 7 0 0 1-14 0v-2"/><line x1="12" y1="19" x2="12" y2="22"/></svg>
            <span id="audio-output-params-label" class="whitespace-nowrap">1.0x / 标准 / 无</span>
            <svg class="shrink-0 text-gray-400" width="8" height="8" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M6 9l6 6 6-6"/></svg>
          </button>
          <div id="audio-output-params-dropdown" class="hidden absolute bottom-full left-0 mb-1 w-[280px] output-params-panel shadow-2xl overflow-hidden z-50">
            <div class="px-3 pt-3 pb-2 border-b border-gray-700/80">
              <div class="vop-section-title">语速</div>
              <div class="flex">
                <button type="button" onclick="setAudioOutputParam('speed','1.0x')" data-aparam="speed" data-avalue="1.0x" class="param-seg-opt">1.0x</button>
                <button type="button" onclick="setAudioOutputParam('speed','0.5x')" data-aparam="speed" data-avalue="0.5x" class="param-seg-opt">0.5x</button>
                <button type="button" onclick="setAudioOutputParam('speed','2.0x')" data-aparam="speed" data-avalue="2.0x" class="param-seg-opt">2.0x</button>
              </div>
            </div>
            <div class="px-3 py-2 border-b border-gray-700/80">
              <div class="vop-section-title">语调</div>
              <div class="flex">
                <button type="button" onclick="setAudioOutputParam('tone','标准')" data-aparam="tone" data-avalue="标准" class="param-seg-opt">标准</button>
                <button type="button" onclick="setAudioOutputParam('tone','柔和')" data-aparam="tone" data-avalue="柔和" class="param-seg-opt">柔和</button>
                <button type="button" onclick="setAudioOutputParam('tone','激昂')" data-aparam="tone" data-avalue="激昂" class="param-seg-opt">激昂</button>
              </div>
            </div>
            <div class="px-3 py-2 pb-3">
              <div class="vop-section-title">音效</div>
              <div class="flex">
                <button type="button" onclick="setAudioOutputParam('effect','无')" data-aparam="effect" data-avalue="无" class="param-seg-opt">无</button>
                <button type="button" onclick="setAudioOutputParam('effect','回声')" data-aparam="effect" data-avalue="回声" class="param-seg-opt">回声</button>
                <button type="button" onclick="setAudioOutputParam('effect','混响')" data-aparam="effect" data-avalue="混响" class="param-seg-opt">混响</button>
              </div>
            </div>
          </div>
          <input type="hidden" id="audio-param-speed" value="1.0x">
          <input type="hidden" id="audio-param-tone" value="标准">
          <input type="hidden" id="audio-param-effect" value="无">
        </div>
        <select id="audio-param-quality" onchange="typeof updateAudioGenCost==='function'&&updateAudioGenCost()" class="text-[10px] border border-gray-200 dark:border-gray-600 rounded-lg px-2 py-1 bg-white dark:bg-gray-800 outline-none shrink-0"><option value="Turbo">质量 Turbo</option><option value="标准">质量 标准</option><option value="高清">质量 高清</option></select>
        <div class="relative shrink-0" id="audio-emotion-wrap">
          <button type="button" id="audio-emotion-btn" onclick="toggleAudioEmotionPicker(event)" class="audio-emotion-btn" title="选择情绪" aria-expanded="false" aria-haspopup="listbox">
            <span id="audio-emotion-btn-emoji" class="audio-emotion-btn-emoji" aria-hidden="true">🎭</span>
            <span class="audio-emotion-btn-text whitespace-nowrap">情绪</span>
          </button>
          <input type="hidden" id="audio-param-emotion" value="">
          <input type="hidden" id="audio-param-emotion-label" value="">
        </div>
        <span id="audio-gen-cost" class="text-[11px] font-medium px-2 py-1 bg-blue-50 dark:bg-blue-900/30 text-blue-600 dark:text-blue-400 rounded-lg border border-blue-100 dark:border-blue-800 shrink-0 whitespace-nowrap inline-flex items-center gap-0.5">💰 本次: <span class="text-yellow-500 leading-none" aria-hidden="true">⚡</span>0.0020</span>
        <div class="flex-1 min-w-[8px]"></div>
        <button type="button" id="audio-gen-btn-desktop" onclick="startAudioGeneration()" class="gen-btn px-4 py-1 bg-gradient-to-r from-blue-500 to-purple-600 text-white text-xs font-semibold rounded-lg hover:from-blue-600 hover:to-purple-700 transition shrink-0">✨ 生成</button>
        </div>
      </div>
    </div>
  </div>
</section>
