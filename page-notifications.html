<section id="page-notifications" class="page-section">
  <div class="flex items-center gap-2 mb-4">
    <button onclick="showPage('inspiration')" class="text-xs text-gray-500 hover:text-gray-800 dark:hover:text-gray-200 flex items-center gap-1"><span>←</span> 返回首页</button>
  </div>
  <div class="border-t border-gray-200 dark:border-gray-700 pt-4 mb-6"></div>
  <div class="text-center mb-6">
    <h2 class="text-lg font-bold">🔔 通知中心</h2>
    <p class="text-xs text-gray-400 mt-1">查看所有系统通知</p>
  </div>
  <div class="border-b border-gray-200 dark:border-gray-700 mb-6"></div>

  <!-- 分类 + 批量操作 -->
  <div class="flex flex-wrap items-center justify-between gap-2 mb-4">
    <div class="flex gap-1 flex-wrap">
      <span class="notif-tab active px-3 py-1.5 bg-blue-500 text-white text-[10px] rounded-lg cursor-pointer transition" data-filter="all">全部</span>
      <span class="notif-tab px-3 py-1.5 border border-gray-200 dark:border-gray-600 text-gray-600 dark:text-gray-400 text-[10px] rounded-lg cursor-pointer hover:bg-gray-50 dark:hover:bg-gray-700 transition" data-filter="unread">未读</span>
      <span class="notif-tab px-3 py-1.5 border border-gray-200 dark:border-gray-600 text-gray-600 dark:text-gray-400 text-[10px] rounded-lg cursor-pointer hover:bg-gray-50 dark:hover:bg-gray-700 transition" data-filter="read">已读</span>
      <span class="notif-tab px-3 py-1.5 border border-gray-200 dark:border-gray-600 text-gray-600 dark:text-gray-400 text-[10px] rounded-lg cursor-pointer hover:bg-gray-50 dark:hover:bg-gray-700 transition" data-filter="interact">互动</span>
      <span class="notif-tab px-3 py-1.5 border border-gray-200 dark:border-gray-600 text-gray-600 dark:text-gray-400 text-[10px] rounded-lg cursor-pointer hover:bg-gray-50 dark:hover:bg-gray-700 transition" data-filter="income">收益</span>
      <span class="notif-tab px-3 py-1.5 border border-gray-200 dark:border-gray-600 text-gray-600 dark:text-gray-400 text-[10px] rounded-lg cursor-pointer hover:bg-gray-50 dark:hover:bg-gray-700 transition" data-filter="system">系统</span>
    </div>
    <div class="flex gap-2">
      <button onclick="markAllRead()" class="px-3 py-1.5 text-[10px] border border-gray-200 dark:border-gray-600 rounded-lg hover:bg-gray-50 dark:hover:bg-gray-700 transition">标为已读</button>
      <button onclick="clearNotifications()" class="px-3 py-1.5 text-[10px] border border-red-200 text-red-500 rounded-lg hover:bg-red-50 dark:hover:bg-red-900/20 transition">清空</button>
    </div>
  </div>

  <!-- ═══ 通知统计 ═══ -->
  <div class="border-t border-gray-200 dark:border-gray-700 pt-6 mb-6"></div>
  <div class="grid grid-cols-2 md:grid-cols-4 gap-3 mb-6">
    <div class="p-3 bg-white dark:bg-gray-800 border border-gray-200 dark:border-gray-700 rounded-xl text-center"><div class="text-[11px] text-gray-400 mb-1">总通知</div><div class="text-lg font-bold text-blue-600">128</div></div>
    <div class="p-3 bg-white dark:bg-gray-800 border border-gray-200 dark:border-gray-700 rounded-xl text-center"><div class="text-[11px] text-gray-400 mb-1">未读</div><div class="text-lg font-bold text-red-500">5</div></div>
    <div class="p-3 bg-white dark:bg-gray-800 border border-gray-200 dark:border-gray-700 rounded-xl text-center"><div class="text-[11px] text-gray-400 mb-1">今日新增</div><div class="text-lg font-bold text-green-600">3</div></div>
    <div class="p-3 bg-white dark:bg-gray-800 border border-gray-200 dark:border-gray-700 rounded-xl text-center"><div class="text-[11px] text-gray-400 mb-1">本月新增</div><div class="text-lg font-bold text-purple-600">23</div></div>
  </div>

  <!-- ═══ 通知列表 ═══ -->
  <div class="border-t border-gray-200 dark:border-gray-700 pt-6 mb-6"></div>
  <div class="space-y-2.5 mb-6" id="notif-list">
    <!-- 由 JS 动态渲染 -->
  </div>
  <div class="text-center mb-6">
    <button onclick="showToast('🔄 已加载更多通知')" class="px-6 py-2 text-xs border border-gray-200 dark:border-gray-600 rounded-lg hover:bg-gray-50 dark:hover:bg-gray-700 transition">🔄 加载更多</button>
  </div>
</section>
